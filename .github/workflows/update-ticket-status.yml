name: Update ticket status

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ticket-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Crawl latest ticket status
        run: npm run update:tickets

      - name: Validate build
        run: |
          npm run lint
          npm run build

      - name: Commit changes
        run: |
          if git diff --quiet -- src/data/schedule.ts; then
            echo "No ticket status changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/schedule.ts
          git commit -m "チケット販売状況を自動更新"
          git push
